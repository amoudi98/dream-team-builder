<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Dream Team Builder</title>
  </head>
  <link rel='stylesheet' href='styles.css'>
  <script src='script.js'></script>
  <body>
    <h1>Real Madrid Dream Team</h1>
    <p>Building the perfect squad...</p>
    <div class="player-card">
  <div class="player-header">
    <h2>Jude Bellingham</h2>
    <span>CAM • #5</span>
  </div>
  <div class="player-stats" id="stats-section" style="display: none;">
    <div class="stat">
      <span class="stat-value">18</span>
      <span class="stat-label">Goals</span>
    </div>
    <div class="stat">
      <span class="stat-value">9</span>
      <span class="stat-label">Assists</span>
    </div>
    <div class="stat">
      <span class="stat-value">92</span>
      <span class="stat-label">Rating</span>
    </div>
  </div>
  <button onclick="toggleStats()" id="stats-btn">
      Show Stats ▼
  </button>
  <button onclick="resetSquad()" id="reset-btn">
      Reset
  </button><button onclick="addToSquad()" id="add-btn">
      Add to Squad
  </button>
  <span class="stat-value" id="count">Empty</span> 
  </body>
</html>
